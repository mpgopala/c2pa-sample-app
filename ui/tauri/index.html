<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C2PA Tool</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="root" id="root">
    <nav class="nav">
      <span class="nav-brand">C2PA Tool</span>
      <button class="nav-tab" id="tab-sign">Sign</button>
      <button class="nav-tab" id="tab-verify">Verify</button>
      <button class="nav-tab" id="tab-settings">Settings</button>
    </nav>
    <div class="content-and-log" id="content-area">
      <div class="page-content" id="page-content"></div>
      <div class="log-resize-handle" id="log-resize-handle"></div>
      <div class="log-pane" id="log-pane"></div>
    </div>
  </div>
  <div id="toast-container" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;"></div>
  <script type="module" src="app.js"></script>
</body>
</html>
